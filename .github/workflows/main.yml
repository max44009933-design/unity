name: 生成 UnityAds Dylib

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4

      - name: 🛠️ 光速安裝 Theos 與 SDK (淺複製加速版)
        run: |
          # 1. 加上 --depth 1，只抓取 Theos 最新狀態，不抓歷史紀錄
          git clone --recursive --depth 1 https://github.com/theos/theos.git ~/theos
          
          # 2. 移除佔位資料夾
          rm -rf ~/theos/sdks
          
          # 3. 核心加速！加上 --depth 1 抓取龐大的 SDK 包，省下大量時間
          git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks
          
          # 4. 註冊環境變數
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: 🚀 開始編譯 (Make)
        run: |
          make clean
          make
        env:
          THEOS: ~/theos

      - name: 📦 打包並交出 Dylib 檔案
        uses: actions/upload-artifact@v4
        with:
          name: UnityAds_Compiled_Dylib
          path: .theos/obj/debug/*.dylib
