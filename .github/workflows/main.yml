name: 生成 UnityAds Dylib

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4

      - name: 🛠️ 手動安裝 Theos 與 SDK (繞過 API 限制)
        run: |
          # 1. 手動 Clone Theos 核心，避免使用會報錯的安裝腳本
          git clone --recursive https://github.com/theos/theos.git ~/theos
          
          # 2. 手動下載 iOS SDK 包
          git clone https://github.com/theos/sdks.git ~/theos/sdks
          
          # 3. 註冊環境變數
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: 🚀 開始編譯 (Make)
        run: |
          make clean
          make
        env:
          THEOS: ~/theos

      - name: 📦 打包並交出 Dylib 檔案
        uses: actions/upload-artifact@v4
        with:
          name: UnityAds_Compiled_Dylib
          path: .theos/obj/debug/*.dylib
