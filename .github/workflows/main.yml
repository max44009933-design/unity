name: 生成 UnityAds Dylib

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4

      - name: 🛠️ 光速安裝 Theos 與 SDK (淺複製加速版)
        run: |
          git clone --recursive --depth 1 https://github.com/theos/theos.git ~/theos
          rm -rf ~/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: 🚀 開始編譯 (Make)
        run: |
          # 🌟 魔法指令：叫機器人當場生出一個空的 Dummy.swift 給 Theos 用！
          touch Dummy.swift
          
          make clean
          make
        env:
          THEOS: ~/theos

      - name: 📦 打包並交出 Dylib 檔案
        uses: actions/upload-artifact@v4
        with:
          name: UnityAds_Compiled_Dylib
          path: .theos/obj/debug/*.dylib
