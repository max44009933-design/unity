name: 生成 UnityAds Dylib

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4

      - name: 🛠️ 安裝編譯工具與 ldid (精準下載版)
        run: |
          # 1. 安裝蓋章工具 ldid (解決上一次的簽名報錯)
          brew install ldid
          
          # 2. 光速安裝 Theos 核心
          git clone --recursive --depth 1 https://github.com/theos/theos.git ~/theos
          rm -rf ~/theos/sdks
          
          # 3. 🌟 駭客級神技：只下載 14.5 SDK，略過其他 5 萬個無用檔案！
          mkdir ~/theos/sdks
          cd ~/theos/sdks
          git init
          git remote add origin https://github.com/theos/sdks.git
          git config core.sparseCheckout true
          echo "iPhoneOS14.5.sdk/" >> .git/info/sparse-checkout
          git pull --depth=1 origin master
          
          # 4. 註冊環境變數
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: 🚀 開始編譯 (Make)
        run: |
          # 自動生成 Swift 鑰匙
          touch Dummy.swift
          
          make clean
          make
        env:
          THEOS: ~/theos

      - name: 📦 打包並交出 Dylib 檔案
        uses: actions/upload-artifact@v4
        with:
          name: UnityAds_Compiled_Dylib
          path: .theos/obj/debug/*.dylib
